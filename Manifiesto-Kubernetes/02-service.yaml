apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: production
spec:
  selector:
    app: backend                # conecta con los pods que tienen este label
  ports:
  - protocol: TCP
    port: 80                    # puerto por el que otros servicios internos lo llaman
    targetPort: 8080            # puerto real donde corre la app dentro del pod
  type: ClusterIP               # solo accesible dentro del clúster, nunca desde internet
                                # ClusterIP protege el backend — todo el tráfico externo
                                # pasa por WAF → ALB → Ingress, nunca directo al backend

---
# Service del Frontend (mismo patrón)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: production
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000            # puerto donde corre el frontend
  type: ClusterIP
