apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: production
type: Opaque
# IMPORTANTE: Este es un pseudo-manifiesto para ilustrar la estructura.
# En producción real estos valores NO se escriben manualmente aquí.
# Son sincronizados automáticamente desde AWS Secrets Manager
# mediante el Secrets Store CSI Driver.
#
# Los valores están en base64 — NO es encriptación, es solo codificación.
# Cualquiera puede decodificarlos con: echo "valor" | base64 --decode
# Por eso dependemos de AWS Secrets Manager para seguridad real.
#
# Para generar base64: echo -n "mi-valor" | base64
data:
  DB_PASSWORD: c3VwZXJzZWNyZXQxMjM=    # base64("supersecret123")
  DB_USERNAME: YWRtaW4=                  # base64("admin")
  JWT_SECRET: bXlqd3RzZWNyZXRrZXk=      # base64("myjwtsecretkey")
