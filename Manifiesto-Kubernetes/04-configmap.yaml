apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  # Ambiente de ejecución
  APP_ENV: "production"
  LOG_LEVEL: "info"

  # URLs de servicios
  API_URL: "https://api.dealengine.com"

  # Configuración de base de datos (no sensible)
  # Los valores sensibles (usuario, contraseña) van en el Secret
  DB_HOST: "db.dealengine.internal"
  DB_PORT: "5432"
  DB_NAME: "dealengine_db"
