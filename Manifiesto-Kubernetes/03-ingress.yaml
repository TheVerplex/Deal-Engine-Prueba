apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # cert-manager genera y renueva el certificado TLS automáticamente
    # sin esto habría que renovar manualmente cada 90 días
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # fuerza HTTPS — rechaza cualquier request por HTTP
    # crítico para proteger datos sensibles de pasajeros
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.dealengine.com        # dominio del backend
    - app.dealengine.com        # dominio del frontend
    secretName: tls-secret      # aquí cert-manager guarda el certificado generado
  rules:
  # Tráfico al backend API
  - host: api.dealengine.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service   # apunta al Service, nunca al pod directamente
            port:
              number: 80
  # Tráfico al frontend
  - host: app.dealengine.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
